name: Wayfair
description: >-
  Wayfair Inc. is one of the world's largest online destinations for home goods
  and furniture. Wayfair offers a developer portal with GraphQL-based APIs for
  suppliers to manage orders, inventory, product catalogs, and shipping.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
