naftiko: 1.0.0-alpha2
info:
  label: Wayfair Supplier API — Authentication
  description: 'Wayfair Supplier API — Authentication. 1 operations. Lead operation: Wayfair Get Access Token. Self-contained
    Naftiko capability covering one Wayfair business surface.'
  tags:
  - Wayfair
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WAYFAIR_API_KEY: WAYFAIR_API_KEY
capability:
  consumes:
  - type: http
    namespace: supplier-authentication
    baseUri: https://api.wayfair.com/v1
    description: Wayfair Supplier API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-token
      path: /auth/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Wayfair Get Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WAYFAIR_API_KEY}}'
  exposes:
  - type: rest
    namespace: supplier-authentication-rest
    port: 8080
    description: REST adapter for Wayfair Supplier API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth/token
      name: auth-token
      description: REST surface for auth-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Wayfair Get Access Token
        call: supplier-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: supplier-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Wayfair Supplier API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: wayfair-get-access-token
      description: Wayfair Get Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: supplier-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
