naftiko: "1.0.0-alpha1"

info:
  label: "Wayfair Supplier API"
  description: >-
    GraphQL-based API for Wayfair suppliers to manage purchase orders,
    inventory, product catalogs, shipping notifications, and returns across
    the Wayfair marketplace serving 10,000+ suppliers.
  tags:
    - E-Commerce
    - GraphQL
    - Suppliers
    - Orders
    - Inventory
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WAYFAIR_CLIENT_ID: WAYFAIR_CLIENT_ID
      WAYFAIR_CLIENT_SECRET: WAYFAIR_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: wayfair
      baseUri: https://api.wayfair.com/v1
      description: "Wayfair Supplier API for order, inventory, and catalog management."
      authentication:
        type: bearer
        token: "{{WAYFAIR_ACCESS_TOKEN}}"
      resources:
        - name: authentication
          path: /auth/token
          description: "OAuth2 token endpoint for supplier authentication."
          operations:
            - name: get-access-token
              method: POST
              description: "Obtain an OAuth2 access token using client credentials."
              outputRawFormat: json
              outputParameters:
                - name: access_token
                  type: string
                  value: "$.access_token"
              body:
                type: json
                data:
                  client_id: "{{WAYFAIR_CLIENT_ID}}"
                  client_secret: "{{WAYFAIR_CLIENT_SECRET}}"

        - name: graphql
          path: /graphql
          description: "Unified GraphQL endpoint for all supplier operations."
          operations:
            - name: execute-graphql-query
              method: POST
              description: "Execute GraphQL queries and mutations for orders, inventory, catalog, and shipping."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  variables: "{{tools.variables}}"
                  operationName: "{{tools.operationName}}"

  exposes:
    - type: rest
      port: 8100
      namespace: wayfair-rest
      resources:
        - path: /v1/auth/token
          name: authentication
          description: "Get Wayfair API access token."
          operations:
            - method: POST
              name: get-access-token
              description: "Obtain OAuth2 bearer token."
              call: "wayfair.get-access-token"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/graphql
          name: graphql
          description: "Execute GraphQL operations."
          operations:
            - method: POST
              name: execute-graphql-query
              description: "Execute a GraphQL query or mutation."
              call: "wayfair.execute-graphql-query"
              with:
                query: "rest.query"
                variables: "rest.variables"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wayfair-mcp
      transport: http
      tools:
        - name: get-access-token
          description: "Obtain a Wayfair API OAuth2 access token using client credentials."
          hints:
            readOnly: false
            openWorld: false
          call: "wayfair.get-access-token"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-graphql-query
          description: "Execute a GraphQL query or mutation against the Wayfair Supplier API."
          hints:
            readOnly: false
            openWorld: false
          call: "wayfair.execute-graphql-query"
          with:
            query: "tools.query"
            variables: "tools.variables"
            operationName: "tools.operationName"
          outputParameters:
            - type: object
              mapping: "$."
